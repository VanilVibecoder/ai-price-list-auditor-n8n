<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Результат обработки прайс-листа в Telegram</title>
  <desc id="desc">Демонстрационная карточка Telegram с итоговым XLSX-файлом и отчётом: 35 исходных строк, 31 строка в итоговом файле, 4 исключено, 3 предупреждения.</desc>
  <rect width="1100" height="620" fill="#d9f0d2"/>
  <g opacity="0.18" fill="#5c8f58">
    <circle cx="90" cy="90" r="24"/><circle cx="220" cy="150" r="18"/><circle cx="1020" cy="110" r="26"/>
    <circle cx="970" cy="500" r="20"/><circle cx="120" cy="520" r="30"/><circle cx="520" cy="80" r="15"/>
  </g>
  <rect x="55" y="45" width="990" height="530" rx="32" fill="#ffffff"/>
  <circle cx="115" cy="112" r="31" fill="#34a8e0"/>
  <path d="M98 111l33-14-8 34-10-10-7 7-2-13z" fill="#fff"/>
